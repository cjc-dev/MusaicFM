name: Build MusaicFM

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: xcodebuild -scheme MusaicFM -configuration Release build SYMROOT="$PWD/build" CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - name: Package
        run: |
          cd build/Release
          zip -r MusaicFM.saver.zip MusaicFM.saver

      - uses: actions/upload-artifact@v4
        with:
          name: MusaicFM.saver
          path: build/Release/MusaicFM.saver.zip
